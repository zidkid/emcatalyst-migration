version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: emcatalyst_db
    environment:
      POSTGRES_USER: emcatalyst
      POSTGRES_PASSWORD: emcatalyst123
      POSTGRES_DB: emcatalyst_db
    # Port not exposed to host — backend connects via internal Docker network
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U emcatalyst -d emcatalyst_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: emcatalyst_backend
    environment:
      DATABASE_URL: postgresql://emcatalyst:emcatalyst123@postgres:5432/emcatalyst_db
      SECRET_KEY: emcatalyst-production-secret-key-change-this-now
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 480
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - upload_data:/app/uploads
    command: >
      sh -c "python -m app.db.init_db && uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 4"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: emcatalyst_frontend
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  postgres_data:
  upload_data:
